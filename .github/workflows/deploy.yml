name: Deploy Node.js App to WebHostMost via sFTP

on:
  push:
    branches:
      - main  # أو اكتب develop بناءً على الفرع الذي تدفع إليه كودك حالياً

jobs:
  deploy:
    name: 🚀 Deploy via sFTP
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 📂 Sync files to WebHostMost
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        server: ${{ secrets.SFTP_SERVER }}
        port: 2323  # المنفذ الرسمي للاستشارة الأمنية في WebHostMost لـ sFTP
        local_path: './'
        remote_path: '/home/${{ secrets.SFTP_USERNAME }}/domains/dev-qu.tct-ksa.com/public_html'
        sftpArgs: '-o StrictHostKeyChecking=no'
        
        # قائمة التجاهل الصارمة والمطابقة لملف gitignore الخاص بمشروعك:
        exclude: |
          **/node_modules
          *.cache
          .DS_Store
          *.log
          logs/
          tmp/
          .vscode/*
          *.code-workspace
          **/tsconfig.tsbuildinfo
          .husky/_
          .husky/.gitignore
          .yarn/*
          **/yarn-error.log
          .pnp.*
          apps/**/yarn.lock
          .env*
          **/.nvmrc
          **/coverage
